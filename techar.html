<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التدريس - رفع ملف الفيديو</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .upload-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 { text-align: center; color: #333; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="upload-card">
    <h2>رفع فيديو جديد</h2>
    <form>
        <div class="input-group">
            <label>عنوان الفيديو</label>
            <input type="text" placeholder="أدخل عنوان الدرس هنا..." required>
        </div>
        <div class="input-group">
            <label>اختر ملف الفيديو</label>
            <!-- تم تغيير النوع إلى file والسماح فقط بملفات الفيديو -->
            <input type="file" accept="video/*" required>
        </div>
        <button type="submit">إرسال الفيديو</button>
    </form>
</div>

</body>
</html>
