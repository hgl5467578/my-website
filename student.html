<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الرياضيات - السادس العلمي</title>
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #0b0e14 0%, #1a1e26 100%); 
            color: #ffffff; 
            margin: 0; 
            padding: 20px; 
            min-height: 100vh;
        }
        .container { max-width: 1100px; margin: auto; }
        
        h1 { 
            text-align: center; 
            color: #d4af37; /* لون ذهبي */
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid #d4af37;
            padding-bottom: 10px;
        }
        
        #videos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 20px;
        }
        
        .card {
            background: #1c202d; /* لون داكن للبطاقة */
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #d4af37; /* إطار ذهبي */
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 24px rgba(212, 175, 55, 0.3);
        }
        
        .card h2 {
            margin-top: 0;
            color: #d4af37;
            font-size: 1.3rem;
            margin-bottom: 15px;
        }
        
        iframe {
            width: 100%;
            height: 180px;
            border-radius: 10px;
            border: 2px solid #d4af37;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📚 دورة الرياضيات - السادس العلمي</h1>
        <div id="videos"></div>
    </div>

    <script>
        // قائمة الفيديوهات
        const videos = [
            { title: "الدرس الأول", url: "https://www.youtube.com/embed/OvsP1rkS7Yw" },
            { title: "الدرس الثاني", url: "https://www.youtube.com/embed/OvsP1rkS7Yw" },
            { title: "الدرس الثالث", url: "https://www.youtube.com/embed/OvsP1rkS7Yw" }
        ];

        const container = document.getElementById("videos");
        videos.forEach(video => {
            container.innerHTML += `
            <div class="card">
                <h2>${video.title}</h2>
                <iframe src="${video.url}" allowfullscreen></iframe>
            </div>
            `;
        });
    </script>
</body>
</html>
