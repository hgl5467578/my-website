<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الطلاب</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: auto;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        #videos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .card {
            background: #ffffff;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            text-align: center;
        }
        .card:hover {
            transform: scale(1.02);
        }
        .card h2 {
            margin-top: 0;
            color: #333;
            font-size: 1.2rem;
        }
        iframe {
            width: 100%;
            height: 200px;
            border-radius: 10px;
            border: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>📚 منصة الدروس</h1>
        <div id="videos"></div>
    </div>

    <script src="videos.js"></script>

    <script>
        const container = document.getElementById("videos");
        
        // التأكد من أن المصفوفة موجودة قبل العرض
        if (typeof videos !== 'undefined') {
            videos.forEach(video => {
                container.innerHTML += `
                <div class="card">
                    <h2>${video.title}</h2>
                    <iframe src="${video.url}" allowfullscreen></iframe>
                </div>
                `;
            });
        }
    </script>
</body>
</html>
