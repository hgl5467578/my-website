<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الأستاذ</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>👨‍🏫 لوحة الأستاذ</h1>

<p>
هذا الموقع يستخدم فيديوهات YouTube فقط.
</p>

<hr>

<label>عنوان الدرس</label>

<input
type="text"
id="title"
placeholder="مثال : الدرس الأول">

<label>رابط فيديو اليوتيوب</label>

<input
type="text"
id="url"
placeholder="https://www.youtube.com/watch?v=xxxxxxxx">

<button onclick="generateCode()">

إنشاء كود الدرس

</button>

<h3>انسخ هذا الكود ثم الصقه داخل ملف videos.js</h3>

<textarea
id="output"
rows="8"
readonly
style="width:100%;">
</textarea>

<br><br>

<a href="student.html">

📚 الانتقال إلى صفحة الطلاب

</a>

</div>

<script>

function generateCode(){

const title=document.getElementById("title").value;

const url=document.getElementById("url").value;

if(title==""||url==""){

alert("أكمل البيانات");

return;

}

let id="";

if(url.includes("watch?v=")){

id=url.split("watch?v=")[1].split("&")[0];

}else if(url.includes("youtu.be/")){

id=url.split("youtu.be/")[1];

}else{

alert("رابط يوتيوب غير صحيح");

return;

}

document.getElementById("output").value=

`{
title:"${title}",
url:"https://www.youtube.com/embed/${id}"
},`;

}

</script>

</body>

</html>
