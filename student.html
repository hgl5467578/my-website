<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الطلاب</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        h1 { text-align: center; color: #333; }
        
        /* هذا هو المسؤول عن الشبكة */
        #videos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        
        .card {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        iframe {
            width: 100%;
            height: 180px;
            border-radius: 10px;
            border: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📚 منصة الدروس</h1>
        <div id="videos"></div>
    </div>

    <!-- كود الجافاسكريبت المدمج للعرض -->
    <script>
        // هنا نضع قائمة الفيديوهات (يمكنك إضافة المزيد هنا)
        const videos = [
            { title: "الدرس الأول", url: "https://www.youtube.com/embed/OvsP1rkS7Yw" },
            { title: "الدرس الثاني", url: "https://www.youtube.com/embed/OvsP1rkS7Yw" },
            { title: "الدرس الثالث", url: "https://www.youtube.com/embed/OvsP1rkS7Yw" }
        ];

        const container = document.getElementById("videos");
        videos.forEach(video => {
            container.innerHTML += `
            <div class="card">
                <h3>${video.title}</h3>
                <iframe src="${video.url}" allowfullscreen></iframe>
            </div>
            `;
        });
    </script>
</body>
</html>
