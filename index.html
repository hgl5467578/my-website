<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأستاذ</title>

    <link rel="stylesheet" href="style.css">

    <style>
        body{
            font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
            background:#f4f7f6;
            margin:0;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .upload-container{
            background:#fff;
            width:90%;
            max-width:550px;
            padding:30px;
            border-radius:12px;
            box-shadow:0 5px 20px rgba(0,0,0,.15);
        }

        h2{
            text-align:center;
            color:#2c3e50;
        }

        p{
            text-align:center;
            color:#666;
        }

        .form-group{
            margin-top:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            box-sizing:border-box;
            font-size:15px;
        }

        button{
            width:100%;
            margin-top:25px;
            padding:14px;
            background:#27ae60;
            color:white;
            border:none;
            border-radius:8px;
            font-size:17px;
            cursor:pointer;
        }

        button:hover{
            background:#1f8d4d;
        }

        .student-link{
            display:block;
            text-align:center;
            margin-top:20px;
            text-decoration:none;
            font-weight:bold;
        }
    </style>

</head>

<body>

<div class="upload-container">

<h2>👨‍🏫 لوحة تحكم الأستاذ</h2>

<p>أدخل عنوان الدرس ورابط فيديو اليوتيوب.</p>

<div class="form-group">

<label>عنوان الدرس</label>

<input
type="text"
id="videoTitle"
placeholder="مثال : الدرس الأول">

</div>

<div class="form-group">

<label>رابط فيديو اليوتيوب</label>

<input
type="text"
id="videoUrl"
placeholder="https://www.youtube.com/watch?v=xxxxxxxx">

</div>

<button id="uploadBtn">

رفع الدرس

</button>

<a class="student-link" href="student.html">

الانتقال إلى صفحة الطلاب

</a>

</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script src="script.js"></script>

</body>

</html>
