<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        /* الحاوية الأساسية للفيديو */
        .video-box {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 450px;
            border: 2px solid #d4af37;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }

        /* الطبقة التي تغطي كل شيء */
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            /* نستخدم 'clip-path' لعمل ثقب في الغطاء عند زر التكبير فقط */
            /* هذا الكود يغطي كل شيء ويترك مربعاً في أسفل اليسار مفتوحاً */
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 85% 100%, 85% 85%, 0% 85%);
            background: transparent;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="video-box">
        <!-- هذا هو الدرع: يغطي كل الفيديو ولا يسمح بالضغط إلا في المنطقة المفتوحة أسفل يسار -->
        <div class="video-overlay"></div>
        
        <iframe 
            src="https://www.youtube.com/embed/OvsP1rkS7Yw?autoplay=1&modestbranding=1&rel=0&iv_load_policy=3" 
            allow="autoplay; encrypted-media" 
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
