<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الرياضيات - السادس العلمي</title>
    
    <style>
        /* ستايل صفحة الدخول */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0b0e14; z-index: 9999;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            color: #d4af37;
        }
        
        /* التصميم الأساسي */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #0b0e14 0%, #1a1e26 100%); 
            color: #ffffff; margin: 0; padding: 20px; min-height: 100vh;
        }
        .container { max-width: 1100px; margin: auto; }
        h1 { text-align: center; color: #d4af37; margin-bottom: 40px; border-bottom: 2px solid #d4af37; padding-bottom: 10px; }
        
        #videos { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; padding: 20px; }
        .card { background: #1c202d; padding: 20px; border-radius: 15px; border: 1px solid #d4af37; text-align: center; }
        .video-wrapper { position: relative; width: 100%; height: 180px; overflow: hidden; border-radius: 10px; border: 2px solid #d4af37; }
        .video-wrapper iframe { position: absolute; top: -30px; left: 0; width: 100%; height: calc(100% + 60px); border: none; }
        
        input { padding: 12px; border-radius: 5px; border: 1px solid #d4af37; background: #1c202d; color: white; width: 250px; text-align: center; margin: 10px; }
        button { padding: 10px 25px; background: #d4af37; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: black; }
    </style>
</head>

<body>

    <div id="login-screen">
        <h1>🔐 دخول الطالب</h1>
        <input type="text" id="code-input" placeholder="أدخل كود الدخول الخاص بك">
        <button onclick="checkCode()">دخول المنصة</button>
    </div>

    <div class="container" id="main-content" style="display: none;">
        <h1>📚 دورة الرياضيات - السادس العلمي</h1>
        <div id="videos"></div>
    </div>

    <script>
        // الـ 20 كود (كل كود 5 أرقام)
        const validCodes = [
            "12543", "83920", "47105", "92837", "10293", 
            "56473", "28374", "91028", "37465", "82910", 
            "47362", "59281", "10394", "67482", "29384", 
            "83746", "51627", "49382", "92019", "74653"
        ];

        // التحقق عند فتح الصفحة إذا كان الطالب دخل مسبقاً
        window.onload = function() {
            if (localStorage.getItem("isLoggedIn") === "true") {
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("main-content").style.display = "block";
            }
        };

        function checkCode() {
            const input = document.getElementById("code-input").value;
            if (validCodes.includes(input)) {
                localStorage.setItem("isLoggedIn", "true");
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("main-content").style.display = "block";
            } else {
                alert("كود خاطئ! حاول مجدداً.");
            }
        }

        // بيانات الفيديوهات
        const videos = [
            { title: "الدرس الأول", url: "https://www.youtube.com/embed/OvsP1rkS7Yw" },
            { title: "الدرس الثاني", url: "https://www.youtube.com/embed/OvsP1rkS7Yw" }
        ];

        const container = document.getElementById("videos");
        videos.forEach(video => {
            container.innerHTML += `
            <div class="card">
                <h2>${video.title}</h2>
                <div class="video-wrapper">
                    <iframe src="${video.url}?modestbranding=1&rel=0&iv_load_policy=3" allowfullscreen></iframe>
                </div>
            </div>
            `;
        });
    </script>
</body>
</html>
