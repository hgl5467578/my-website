<style>
    /* هذا هو "الدرع العظيم" الذي سيغطي كل شيء ويمنع أي نقرة */
    .video-shield-full { 
        position: absolute; 
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 100%; 
        z-index: 20; /* رفعنا الطبقة لتكون فوق كل شيء */
        background: rgba(0, 0, 0, 0); 
        pointer-events: auto; 
    }
</style>

<script>
    function loadVideo(element, url) {
        const videoId = url.split('/').pop().split('?')[0]; 
        element.innerHTML = `
            <div class="video-shield-full"></div>
            <iframe 
                src="https://www.youtube.com/embed/${videoId}?autoplay=1&modestbranding=1&rel=0&controls=0" 
                style="width:100%; height:100%; border:none;" 
                allow="autoplay; encrypted-media" 
                allowfullscreen>
            </iframe>
        `;
    }
</script>
